<!-- npm run dev -->
<!-- euro34.github.io/APTracker -->
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

        <!-- For favicon png -->
        <link rel="shortcut icon" type="image/icon" href="/logo/favicon.ico">
        <link rel="apple-touch-icon" sizes="180x180" href="/logo/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/logo/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/logo/favicon-16x16.png">


        <!-- Style -->
        <link rel="stylesheet" href="src/assets/css/main.css">
        <link rel="stylesheet" href="src/assets/css/toolbar.css">

        <!-- Title -->
        <title>AP Tracker</title>
    </head>
    <body>
        <div class="toolbar">
            <div class="toolbar-left">
                <img id="logo" src="AP_Logo.svg" alt="AP Tracker Logo">
                <h1>AP Tracker</h1>
            </div>
            <div class="toolbar-right">
                <button id="settings-button"><img id="setting" src="src/assets/glyph/setting.svg" alt="Setting"></button>
                <button id="export"><img id="export-icon" src="src/assets/glyph/export.svg" alt="Export"></button>
                <button id="import"><img id="import-icon" src="src/assets/glyph/import.svg" alt="Import"></button>
            </div>
        </div>
        <div class="workflow">
        </div>
    </body>
    <footer>
        <script type="module" src="/src/UI/Test.ts"></script>
    </footer>
</html>
